paths:
  - name: "datasets_path"
    host_path: "/raid/praateekm/datasets"
    container_path: "/raid/praateekm/datasets"
  - name: "model_weights_path"
    host_path: "/raid/praateekm/hf_cache"
    container_path: "/raid/praateekm/hf_cache"
  - name: "results_path"
    host_path: "/raid/praateekm/curator-nightly/results"
    container_path: "/raid/praateekm/curator-nightly/results"

datasets:
  - name: "tinystories"
    formats:
      - type: "parquet"
        path: "/raid/praateekm/datasets/fineweb-edu-fortified-5m-1280"
  - name: "text_models_hf_cache"
    formats:
      - type: "files"
        path: "/raid/praateekm/hf_cache"

sinks:
  - name: "slack"
    enabled: false

entries:
  - name: embedding_generation_raydata
    args: >-
      --benchmark-results-path={session_entry_dir}
      --output-path={session_entry_dir}/scratch/output
      --executor=ray_data
      --input-path={dataset:tinystories,parquet}
      --load-dataset-ratio=0.2
      --model-identifier=google/embeddinggemma-300m
      --model-variation=vllm_text_pretokenized
      --model-inference-batch-size=32
      --model-num-workers=4
      --max-chars=1500
      --cache-dir={dataset:text_models_hf_cache,files}
    timeout_s: 1200

  - name: embedding_generation_xenna
    args: >-
      --benchmark-results-path={session_entry_dir}
      --output-path={session_entry_dir}/scratch/output
      --executor=xenna
      --input-path={dataset:tinystories,parquet}
      --load-dataset-ratio=0.2
      --model-identifier=google/embeddinggemma-300m
      --model-variation=vllm_text_pretokenized
      --model-inference-batch-size=32
      --model-num-workers=4
      --max-chars=1500
      --cache-dir={dataset:text_models_hf_cache,files}
    ray:
      num_cpus: 64
      num_gpus: 4
    timeout_s: 1200

  - name: embedding_generation_ray_serve_endpoint
    args: >-
      --benchmark-results-path={session_entry_dir}
      --output-path={session_entry_dir}/scratch/output
      --executor=ray_data
      --input-path={dataset:tinystories,parquet}
      --load-dataset-ratio=0.2
      --model-identifier=google/embeddinggemma-300m
      --model-variation=ray_serve_endpoint
      --cache-dir={dataset:text_models_hf_cache,files}
      --server-replicas=4
      --client-num-workers=16
      --endpoint-max-concurrent-requests=64
      --endpoint-truncate-prompt-tokens=0
      --endpoint-input-format=text
      --endpoint-request-batch-size=8
      --endpoint-encoding-format=float
      --endpoint-max-chars=1500
      --endpoint-client-mode=tasks
      --endpoint-request-timeout-s=900
      --endpoint-pooler-config={}
    timeout_s: 2400

  - name: embedding_generation_dynamo_endpoint
    args: >-
      --benchmark-results-path={session_entry_dir}
      --output-path={session_entry_dir}/scratch/output
      --executor=ray_data
      --input-path={dataset:tinystories,parquet}
      --load-dataset-ratio=0.2
      --model-identifier=google/embeddinggemma-300m
      --model-variation=dynamo_endpoint
      --cache-dir={dataset:text_models_hf_cache,files}
      --server-replicas=4
      --client-num-workers=16
      --endpoint-max-concurrent-requests=64
      --endpoint-truncate-prompt-tokens=0
      --endpoint-input-format=text
      --endpoint-request-batch-size=8
      --endpoint-encoding-format=float
      --endpoint-max-chars=1500
      --endpoint-client-mode=tasks
      --endpoint-request-timeout-s=900
      --endpoint-pooler-config={}
    timeout_s: 1800
