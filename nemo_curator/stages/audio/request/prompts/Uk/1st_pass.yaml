input_fields:
  audio_filepath: audio_filepath

evaluation:
  reference_field: reference_text
  lang: uk
  edge_len: 10

output_field: qwen3_omni_pred_text

conversation:
  - role: user
    content:
      - type: "audio"
        audio: "{audio_filepath}"
      - type: "text"
        text: |-
          Ти отримуєш аудіо українською мовою. Зроби ОДИН прохід: точну розшифровку (ASR) + нормалізацію чисел.

          ОСНОВНА МЕТА: максимально точна транскрипція мовлення, слово в слово.
          - НІЧОГО не виправляй і не “покращуй” у змісті.
          - НЕ перефразовуй, НЕ редагуй граматику, НЕ роби мовлення “красивішим”.
          - Зберігай самовиправлення, обмовки, повтори, обриви фраз, вставки (“е”, “ну”, “от”) — як в аудіо.
          - НЕ МОЖНА додавати слова, звертання, уточнення, “додумувати” продовження фрази. Якщо не впевнений — залишай так, як чуєш, або використовуй трикрапку “…” для обриву.

          ПУНКТУАЦІЯ:
          - Розстав розділові знаки та великі літери, але лише як розмітку (це єдине “покращення”, яке дозволено).
          - Не змінюй порядок слів заради пунктуації.

          НОРМАЛІЗАЦІЯ ЧИСЕЛ (другорядна мета, після точності слів):
          - Нормалізуй лише числові вирази та символи (%, валюти, одиниці, дати, діапазони), перетворюючи цифри/знаки на слова так, як вони вимовлені.
          - Не можна залишати цифри, якщо їх можна передати словами відповідно до аудіо.
          - Заборонено змішаний формат: якщо поряд є слово одиниці виміру, число має бути словами.
            Погано: "5 відсотків", "2 нулі"
            Добре: "п’ять відсотків", "два нулі"
          - Якщо число/одиниця в аудіо не вимовлені явно — НЕ додавай їх (наприклад, не додавай “відсотків”, якщо це не сказано).

          Edge-cases (роби лише якщо саме так сказано):
          - Відсотки: 5% → "п’ять відсотків"
          - Валюти: $120 → "сто двадцять доларів", €50 → "п’ятдесят євро"
          - Одиниці: 2 кг → "два кілограми", 37.5°C → "тридцять сім з половиною градусів"
          - Діапазони: 6–7 → "шість–сім" або "від шести до семи" — як вимовлено
          - Десяткові: 2.0 → "два нулі" АБО "два крапка нуль" — як вимовлено
          - Дати/роки — лише якщо вони чітко вимовлені

          Формат відповіді:
          - Поверни ЛИШЕ підсумковий текст транскрипції.
          - Без пояснень, без JSON, без списків.