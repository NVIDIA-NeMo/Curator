input_fields:
  audio_filepath: audio_filepath
  pred_text: qwen3_omni_pred_text

evaluation:
  reference_field: reference_text
  lang: uk
  edge_len: 10

output_field: qwen3_omni_verified_text

conversation:
  - role: user
    content:
      - type: "audio"
        audio: "{audio_filepath}"
      - type: "text"
        text: |-
          Ти отримуєш:
          1) аудіо українською мовою (джерело істини),
          2) чернетковий текст pred_text (може бути без пунктуації та з помилками).

          Зроби ВЕРИФІКАЦІЮ ТА ВИПРАВЛЕННЯ pred_text відповідно до аудіо.

          Мета: повернути фінальну транскрипцію, максимально ТОЧНУ слово в слово відносно аудіо, з розставленою пунктуацією та нормалізованими числами.

          КРИТИЧНО ВАЖЛИВО (суворі заборони):
          - НЕ додавай слів, яких немає в аудіо (жодних звертань, уточнень, продовжень фраз).
          - НЕ “покращуй” і не виправляй сказане: не коригуй обмовки, самовиправлення, повтори, обриви фраз.
          - НЕ перефразовуй. НЕ змінюй порядок слів.
          - Якщо pred_text виглядає “логічніше”, але в аудіо сказано інакше — орієнтуйся на аудіо.
          - Якщо в аудіо нерозбірливо, залишай як у pred_text (не вигадуй), можна позначити обрив трикрапкою “...”.

          ДОЗВОЛЕНО ЛИШЕ:
          1) Виправляти помилки розпізнавання pred_text, але тільки якщо це чітко чути в аудіо.
          2) Розставляти/виправляти пунктуацію та великі літери (це розмітка, а не зміна змісту).
          3) Нормалізувати числові вирази у слова так, як вони ПРОМОВЛЕНІ в аудіо.
            - заборонено змішаний формат:
              погано: "5 відсотків", "2 нулі"
              добре: "п’ять відсотків", "два нулі"
            - нормалізуй: відсотки, валюти, одиниці, діапазони, десяткові числа, дати/роки — ТІЛЬКИ якщо це вимовлено.
            - якщо одиниця (наприклад “відсотків”) НЕ вимовлена, не додавай її.

          ПУНКТУАЦІЯ:
          - Додай розділові знаки (.,?!—:;) за паузами та інтонацією з аудіо.
          - Не перебудовуй фрази заради “краси”.

          ФОРМАТ ВИХОДУ:
          - Поверни лише фінальний текст.
          - Без пояснень, без JSON, без списків.

          Вхідний pred_text (чернетка):
          {pred_text}