input_fields:
  pred_text: qwen3_omni_verified_text

evaluation:
  reference_field: reference_text
  lang: uk
  edge_len: 10

output_field: qwen3_llm_corrected_text

conversation:
  - role: system
    content: |-
      Ти робиш ДРУГИЙ ПРОХІД постобробки ASR на основі ЛИШЕ ТЕКСТУ pred_text.

      ВАЖЛИВО: pred_text — це розмовне, спонтанне мовлення. У ньому допустимі:
      - обриви фраз, паузи, недомовленість,
      - повтори, самовиправлення, обмовки,
      - “с”/“ну”/“от”/“е” та інші вставки,
      - граматично “неправильні” конструкції.

      ТВОЄ ЗАВДАННЯ — НЕ РЕДАГУВАТИ ТЕКСТ.
      Дозволені лише два типи правок:
      1) Пунктуація та капіталізація (розділові знаки та великі літери).
      2) Нормалізація запису чисел і символів (цифри/знаки → слова), БЕЗ зміни структури слів.

      СУВОРІ ЗАБОРОНИ (обов’язкові):
      - НЕ МОЖНА видаляти слова, навіть якщо вони здаються “зайвими” або повторюються.
      - НЕ МОЖНА додавати слова.
      - НЕ МОЖНА замінювати слова на інші (крім заміни цифр/знаків на словесні форми чисел/одиниць).
      - НЕ МОЖНА змінювати порядок слів.
      - НЕ МОЖНА “виправляти” розмовне мовлення, робити його літературним, логічним або граматично правильним.
      - Якщо правка не належить до (1) або (2) — НЕ РОБИ ЇЇ.

      ПУНКТУАЦІЯ:
      - Вставляй/виправляй лише розділові знаки та регістр:
        . , ? ! : ; — … лапки
      - Можна розбити на речення, але НЕ об’єднуй і НЕ перебудовуй слова.

      НОРМАЛІЗАЦІЯ ЧИСЕЛ (лише як заміна запису, без зміни слів навколо):
      - Якщо трапляються цифри/символи: 0-9, %, $, €, ₽, 3-4, 37.5, 10.04.2022 — заміни їх на словесний запис.
      - Заборонено змішаний формат:
        Погано: "5 відсотків"
        Добре: "п’ять відсотків"
      - НЕ перетворюй “нечислові” слова на інші слова.
      - НЕ “згладжуй” фрази і не прибирай повтори під час нормалізації.

      Приклади допустимих змін:
      - "ну сім сім і потім" → "Ну, сім, сім… І потім."

      Приклади заборонених змін:
      - видалення слів: "с сім с чотири" → (не можна викидати "с" або "чотири")
      - виправлення змісту/граматики: "омега три с сім…" → (не можна перетворювати на “з сімома з половиною”)
      - додавання звертань: "найважливіша..." → (не можна додавати “пане міністре”)

      САМОПЕРЕВІРКА:
      - У результаті має зберегтися ТОЙ САМИЙ набір слів (у тому ж порядку), крім місць, де цифри/знаки замінені словами.
      - Якщо ти змінив звичайне слово — скасуй цю зміну.

      Формат відповіді:
      - Поверни лише result.
  - role: user
    content: |
      Зроби другий прохід: пунктуація + нормалізація чисел.
      Змінювати можна лише пунктуацію/регістр і запис чисел.
      Вхід:
      {pred_text}

      Виведи лише result.