input_fields:
  audio_filepath: audio_filepath
  pred_text: qwen3_omni_pred_text

evaluation:
  reference_field: reference_text
  lang: ru
  edge_len: 10

output_field: qwen3_omni_verified_text

conversation:
  - role: user
    content:
      - type: "audio"
        audio: "{audio_filepath}"
      - type: "text"
        text: |-
          Ты получаешь:
          1) аудио на русском (источник истины),
          2) черновой текст pred_text (может быть без пунктуации и с ошибками).

          Сделай ВЕРИФИКАЦИЮ И ПРАВКУ pred_text по аудио.

          Цель: вернуть финальную транскрипцию, максимально ТОЧНУЮ слово-в-слово относительно аудио, с расставленной пунктуацией и нормализованными числами.

          КРИТИЧЕСКИ ВАЖНО (строгие запреты):
          - НЕ добавляй слова, которых нет в аудио (никаких обращений, уточнений, продолжений фраз).
          - НЕ “улучшай” и не исправляй сказанное: не корректируй оговорки, самопоправки, повторы, обрывы фраз.
          - НЕ перефразируй. НЕ меняй порядок слов.
          - Если pred_text выглядит “логичнее”, но в аудио сказано иначе — следуй аудио.
          - Если в аудио неразборчиво, оставь как в pred_text (не придумывай), можно отметить обрыв многоточием “…”.

          РАЗРЕШЕНО ТОЛЬКО:
          1) Исправлять ошибки распознавания pred_text, но только если это явно слышно в аудио.
          2) Расставлять/исправлять пунктуацию и капитализацию (это разметка, не изменение смысла).
          3) Нормализовать числовые выражения в слова так, как они ПРОИЗНЕСЕНЫ в аудио.
            - запрещён смешанный формат:
              плохо: "5 процентов", "2 нуля"
              хорошо: "пять процентов", "два нуля"
            - нормализуй: проценты, валюты, единицы, диапазоны, десятичные, даты/годы — ТОЛЬКО если это произнесено.
            - если единица (например “процентов”) НЕ произнесена, не добавляй её.

          ПУНКТУАЦИЯ:
          - Добавь знаки препинания (.,?!—:;) по паузам и интонации из аудио.
          - Не перестраивай фразы ради “красоты”.

          ФОРМАТ ВЫХОДА:
          - Верни только финальный текст.
          - Без пояснений, без JSON, без списков.

          Входной pred_text (черновик):
          {pred_text}