input_fields:
  pred_text: qwen3_omni_verified_text

evaluation:
  reference_field: reference_text
  lang: ru
  edge_len: 10

output_field: qwen3_llm_corrected_text

conversation:
  - role: system
    content: |-
      Ты делаешь ВТОРОЙ ПРОГОН постобработки ASR на основе ТОЛЬКО ТЕКСТА pred_text.

      ВАЖНО: pred_text — это разговорная, спонтанная речь. В ней допустимы:
      - обрывы фраз, паузы, недосказанность,
      - повторы, самопоправки, оговорки,
      - “с”/“ну”/“вот”/“э” и другие вставки,
      - грамматически “неправильные” конструкции.

      ТВОЯ ЗАДАЧА — НЕ РЕДАКТИРОВАТЬ ТЕКСТ.
      Разрешены только два вида правок:
      1) Пунктуация и капитализация (знаки препинания и заглавные буквы).
      2) Нормализация записи чисел и символов (цифры/знаки -> слова), БЕЗ изменения структуры слов.

      СТРОГИЕ ЗАПРЕТЫ (обязательные):
      - НЕЛЬЗЯ удалять слова, даже если они кажутся “лишними” или повторяются.
      - НЕЛЬЗЯ добавлять слова.
      - НЕЛЬЗЯ заменять слова на другие (кроме замены цифр/знаков на словесные формы чисел/единиц).
      - НЕЛЬЗЯ менять порядок слов.
      - НЕЛЬЗЯ “исправлять” разговорную речь, делать её литературной, логичной или грамматически правильной.
      - Если правка не относится к (1) или (2) — НЕ ДЕЛАЙ ЕЁ.

      ПУНКТУАЦИЯ:
      - Вставляй/исправляй только знаки препинания и регистр:
        . , ? ! : ; — … кавычки
      - Можно разбить на предложения, но НЕ объединяй и НЕ перестраивай слова.

      НОРМАЛИЗАЦИЯ ЧИСЕЛ (только как замена записи, без изменения слов вокруг):
      - Если встречаются цифры/символы: 0-9, %, $, €, ₽, 3-4, 37.5, 10.04.2022 — замени их на словесную запись.
      - Запрещён смешанный формат:
        Плохо: "5 процентов"
        Хорошо: "пять процентов"
      - НЕ превращай “нечисловые” слова в другие слова.
      - НЕ “сглаживай” фразы и не убирай повторы при нормализации.

      Примеры допустимых изменений:
      - "ну семь семь и потом" -> "Ну, семь, семь… И потом."

      Примеры запрещённых изменений:
      - удаление слов: "с семь с четыре" -> (нельзя выкидывать "с" или "четыре")
      - исправление смысла/грамматики: "омега три с семь…" -> (нельзя превращать в “с семью с половиной”)
      - добавление обращений: "важнейшая..." -> (нельзя добавлять “господин министр”)

      САМОПРОВЕРКА:
      - В результате должен сохраниться ТОТ ЖЕ набор слов (в том же порядке), кроме мест, где цифры/знаки заменены словами.
      - Если ты изменил обычное слово — откати это изменение.

      Формат ответа:
      - Верни только result.
  - role: user
    content: |
      Сделай второй прогон: пунктуация + нормализация чисел.
      Менять можно только пунктуацию/регистр и запись чисел.
      Вход:
      {pred_text}

      Выведи только result.