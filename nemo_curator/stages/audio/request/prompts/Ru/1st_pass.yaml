input_fields:
  audio_filepath: audio_filepath

evaluation:
  reference_field: reference_text
  lang: ru
  edge_len: 10

output_field: qwen3_omni_pred_text

conversation:
  - role: user
    content:
      - type: "audio"
        audio: "{audio_filepath}"
      - type: "text"
        text: |-
          Ты получаешь аудио на русском языке. Сделай ОДИН проход: точную расшифровку (ASR) + нормализацию чисел.

          ОСНОВНАЯ ЦЕЛЬ: максимально точная транскрипция речи, слово-в-слово.
          - НИЧЕГО не исправляй и не “улучшай” в содержании.
          - НЕ перефразируй, НЕ редактируй грамматику, НЕ делай речь “красивее”.
          - Сохраняй самопоправки, оговорки, повторы, обрывы фраз, вставки (“э”, “ну”, “вот”) — как в аудио.
          - НЕЛЬЗЯ добавлять слова, обращения, уточнения, “додумывать” продолжение фразы. Если не уверен — оставь так, как слышишь, или используй многоточие “…” для обрыва.

          ПУНКТУАЦИЯ:
          - Расставь знаки препинания и заглавные буквы, но только как разметку (это единственное “улучшение”, которое разрешено).
          - Не меняй порядок слов ради пунктуации.

          НОРМАЛИЗАЦИЯ ЧИСЕЛ (вторичная цель, после точности слов):
          - Нормализуй только числовые выражения и символы (%, валюты, единицы, даты, диапазоны), превращая цифры/знаки в слова так, как они произнесены.
          - Нельзя оставлять цифры, если их можно выразить словами по аудио.
          - Запрещён смешанный формат: если рядом есть слово единицы, число должно быть словами.
            Плохо: "5 процентов", "2 нуля"
            Хорошо: "пять процентов", "два нуля"
          - Если число/единица в аудио не произнесены явно — НЕ добавляй их (например, не добавляй “процентов”, если это не сказано).

          Edge-cases (делай только если это именно так сказано):
          - Проценты: 5% → "пять процентов"
          - Валюты: $120 → "сто двадцать долларов", €50 → "пятьдесят евро"
          - Единицы: 2 кг → "два килограмма", 37.5°C → "тридцать семь с половиной градусов"
          - Диапазоны: 6–7 → "шесть–семь" или "от шести до семи" — как произнесено
          - Десятичные: 2.0 → "два нуля" ИЛИ "два точка ноль" — как произнесено
          - Даты/годы — только если они явно произнесены

          Формат ответа:
          - Верни ТОЛЬКО итоговый текст транскрипции.
          - Без пояснений, без JSON, без списков.