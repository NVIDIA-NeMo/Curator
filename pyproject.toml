[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = [
    "nemo_curator",
    "nemo_curator.*",
]

[tool.setuptools.package-data]
"nemo_curator.stages.text.experimental.translation" = ["prompts/*.yaml"]

[tool.setuptools.dynamic]
version = { attr = "nemo_curator.package_info.__version__" }

[project]
name = "nemo-curator"
dynamic = ["version"]
authors = [
    { name = "Ayush Dattagupta", email = "adattagupta@nvidia.com" },
    { name = "Abhinav Garg", email = "abhgarg@nvidia.com" },
    { name = "Praateek Mahajan", email = "praateekm@nvidia.com" },
    { name = "Sarah Yurick", email = "syurick@nvidia.com" },
    { name = "Vibhu Jawa", email = "vjawa@nvidia.com" },
]
description = "Scalable Data Preprocessing Tool for Training Large Language Models"
readme = "README.md"
requires-python = ">=3.11,<3.14"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "absl-py>=2.0.0,<3.0.0",
    "comment_parser",
    "cosmos-xenna==0.2.0",
    "fsspec",
    "hydra-core",
    "jieba==0.42.1",
    "loguru",
    "mecab-python3",
    "omegaconf",
    "openai>=1.0.0",
    "pandas>=2.1.0",
    "pyarrow",
    "ray[default,data] @ https://s3-us-west-2.amazonaws.com/ray-wheels/latest/ray-3.0.0.dev0-cp313-cp313-manylinux2014_x86_64.whl ; python_version == '3.13' and platform_machine == 'x86_64' and platform_system != 'Darwin'",
    "torch",
    "transformers",
]

[project.optional-dependencies]
cuda12 = [
    "gpustat",
    "nvidia-ml-py",
]
vllm = ["vllm[flashinfer,runai,otel]==0.22.0+cu129; (platform_machine == 'x86_64' and platform_system != 'Darwin')"]

# Inference Server (Ray Serve + vLLM) - for serving LLMs alongside Curator pipelines
inference_server = [
    "nemo_curator[cuda12]",
    "nemo_curator[vllm]",
    "ai-dynamo>=1.3.0.dev0; (platform_machine == 'x86_64' and platform_system != 'Darwin')",
    "boto3>=1.35", # Get rid once https://github.com/ray-project/ray/issues/61269 is fixed
    "nixl-cu12>=0.10.0; (platform_machine == 'x86_64' and platform_system != 'Darwin')",
    "ray[serve,llm]>=2.55.1",
]

# Installs CPU + GPU text curation modules
# RAPIDS pinned to the nightly dev line (26.08.0a*) from the rapids-nightly index
# (see [[tool.uv.index]] + [tool.uv.sources]) so the weekly benchmark exercises
# upstream cudf/cuml/cugraph as they land. The >=…a0 floor is an explicit
# prerelease marker, which prerelease="if-necessary-or-explicit" honors.
deduplication_cuda12 = [
    # Top-level RAPIDS packages
    "cudf-cu12>=26.8.0a0,<26.10",
    "cuml-cu12>=26.8.0a0,<26.10",
    "pylibcugraph-cu12>=26.8.0a0,<26.10",
    "pylibraft-cu12>=26.8.0a0,<26.10",
    "raft-dask-cu12>=26.8.0a0,<26.10",
    "rapidsmpf-cu12>=26.8.0a0,<26.10",
    # rapidsmpf 26.08 moved partition_and_pack/unpack_and_concat out of rapidsmpf into the
    # new cudf-streaming package; the dedup shuffler now depends on it directly.
    "cudf-streaming-cu12>=26.8.0a0,<26.10",
    # RAPIDS nightly transitives, listed EXPLICITLY so prerelease="if-necessary-or-explicit"
    # enables prereleases for them (stable <26.8 builds also exist on the nvidia index, so
    # they would NOT qualify as "if-necessary"). Enumerated from a resolved uv.lock; keep in
    # sync when the RAPIDS line bumps (re-run: parse uv.lock for the rapids-nightly index).
    "libcudf-cu12>=26.8.0a0,<26.10",
    "pylibcudf-cu12>=26.8.0a0,<26.10",
    "rmm-cu12>=26.8.0a0,<26.10",
    "librmm-cu12>=26.8.0a0,<26.10",
    "libcuml-cu12>=26.8.0a0,<26.10",
    "libcugraph-cu12>=26.8.0a0,<26.10",
    "libraft-cu12>=26.8.0a0,<26.10",
    "libcuvs-cu12>=26.8.0a0,<26.10",
    "libkvikio-cu12>=26.8.0a0,<26.10",
    "libnvforest-cu12>=26.8.0a0,<26.10",
    "nvforest-cu12>=26.8.0a0,<26.10",
    "librapidsmpf-cu12>=26.8.0a0,<26.10",
    "libcudf-streaming-cu12>=26.8.0a0,<26.10",
    "dask-cuda>=26.8.0a0,<26.10",
    "rapids-dask-dependency>=26.8.0a0,<26.10",
    # UCXX stack (RAPIDS comms) — separate 0.5x version line
    "ucxx-cu12>=0.51.0a0,<0.52",
    "libucxx-cu12>=0.51.0a0,<0.52",
    "distributed-ucxx-cu12>=0.51.0a0,<0.52",
