[dependency-groups]
build = ["setuptools", "torch<=2.11.0", "Cython", "packaging"]
dev = ["jupyter"]
linting = ["pre-commit", "ruff==0.14.10"]
test = [
    "coverage",
    "debugpy",
    "GitPython",
    "oauth2client",
    "pydrive2",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "pytest-httpserver",
    "pytest-loguru",
    "pyyaml",
    "rich",
    "scikit-learn",  # cap lifted for RAPIDS nightly (cuml 25.10's <1.8.0 incompatibility no longer applies); re-cap if the lock surfaces it
    "s3fs>=2024.12.0", # added for testing cloud fs
    "slack_sdk",
]

[tool.uv]
required-version = ">=0.7.0"
package = true
managed = true
default-groups = ["dev", "test"]
index-strategy = "unsafe-best-match"
# Only pick a prerelease when a requirement carries an explicit prerelease marker
# (ai-dynamo>=1.3.0.dev0, ray nightly URL, and the RAPIDS nightly tree listed
# explicitly in deduplication_cuda12) or when every version in range is a
# prerelease (otel's 0.x betas). This deliberately avoids "allow", which would
# also drag in unrelated prereleases (e.g. azure-identity betas, msal rc).
prerelease = "if-necessary-or-explicit"
no-build-isolation-package = ["flash-attn"]
# CVE floors removed as proven-redundant (2026-06): with the ray-nightly /
# ai-dynamo-nightly / transformers-5 / RAPIDS-nightly stack, the resolver already
# lands at or above every prior CVE fix without an explicit floor — verified by
# locking with this list empty and comparing resolved versions:
#   aiohttp 3.14.0 (≥3.13.3), cryptography 46.0.7 (≥46.0.6), nbconvert 7.17.1
#   (≥7.17.0), pillow 12.2.0 (≥12.1.1), pyasn1 0.6.3 (≥0.6.2), pyopenssl 26.0.0,
#   python-multipart 0.0.32 (≥0.0.22), starlette 1.0.1 (≥0.49.1), urllib3 2.7.0
#   (≥2.6.3), wheel 0.46.3 (≥0.46.2), setuptools 80.10.2 (≥80.10.1).
# If a weekly re-lock ever drops one below its fix, re-add just that floor here.
constraint-dependencies = [
]
override-dependencies = [
    "fsspec>=2025.3.0", # required because nemo-toolkit[asr] pins fsspec==2024.12.0 while data-designer-engine==0.6.1 requires fsspec>=2025.3.0,<2026
    "huggingface-hub>=1.5.0,<2", # Override whisperx's huggingface-hub<1.0.0 pin (and other audio transitives); transformers 5 needs >=1.5,<2 and data-designer-engine 0.6.1 needs >=1.0.1,<2 — intersection is >=1.5,<2. Audio stack on hub 1.x is a known canary risk.
    "apex; sys_platform == 'never'",
    "distance; sys_platform == 'never'",
    "kaldiio;  sys_platform == 'never'",
    "levenshtein;  sys_platform == 'never'",
    "numpy>=2.0.0", # Override nemo-toolkit's <2.0.0 cap; upper bound dropped (numba 0.65 + cudf nightly govern the real ceiling) — let the resolver pick the newest compatible numpy
    "packaging>=25", # Override lightning 2.4.0's packaging<25 cap (lightning is pinned to 2.4.0 by nemo-toolkit[asr]<=2.4.0 ∩ pyannote-audio>=2.4); data-designer 0.6.1 requires packaging>=25. packaging 25 is low-risk for lightning.
    "pandas>=3.0.0", # cudf-cu12 nightly (26.08) requires pandas>=3.0.0, but data-designer-config 0.6.1 (and nemo-toolkit transitives) still cap pandas<3. Force pandas 3 so the nightly RAPIDS line wins; data-designer on pandas 3 is a known canary risk surfaced by the weekly run.
    "numba==0.65.0", # Override RAPIDS/legacy caps for the inference image; vLLM 0.22 requires numba 0.65.0
    "protobuf>=5.29.6",  # Override nemo-toolkit's ~=5.29.5 pin; floor at 5.29.6 for CVE GHSA-8qvm-5x2c-j2w7. <7.0 cap dropped — ray nightly should handle protobuf 6/7; weekly run will catch the FieldDescriptor break if it regresses
    "transformers>=5.0,<6", # Override nemo-toolkit[asr]'s transformers>=4.57,<4.58 pin to force the transformers 5.x nightly bump; audio stack on transformers 5 is a known canary risk (prior runs passed with the pin overridden)
    "torch==2.11.0; sys_platform == 'linux' and (platform_machine == 'x86_64' or platform_machine == 'aarch64')", # Match vLLM's CUDA requirements; Linux resolves to cu129 via tool.uv.sources
    "torchaudio==2.11.0; sys_platform == 'linux' and (platform_machine == 'x86_64' or platform_machine == 'aarch64')", # Match torch==2.11.0
    "torchvision==0.26.0; sys_platform == 'linux' and (platform_machine == 'x86_64' or platform_machine == 'aarch64')", # Match torch==2.11.0
    "torchcodec~=0.11.0; platform_machine == 'x86_64' and platform_system != 'Darwin'", # pin to torchcodec 0.11.x for torch 2.11 ABI compatibility; torchcodec does not declare a torch dep, so the resolver cannot enforce the match; satisfies pyannote-audio's >=0.7.0 floor; x86_64-only since aarch64 lacks wheels
    "nixl-cu12>=0.10.0; (platform_machine == 'x86_64' and platform_system != 'Darwin')",  # Override ray[llm]'s unconditional nixl dep for ARM
    "nixl-cu13; sys_platform == 'never'", # ray[llm]/nixl hard-pin the CUDA-13 NIXL backend. On this CUDA-12.9 image vLLM's eager `import nixl_ep` would load cu13's nixl_ep_cpp.so and dlopen the absent libcudart.so.13. Drop it; the nixl meta + nixl-cu12 backend (nixl's own default) remain.
    "xgrammar>=0.1.32", # Override vllm's ==0.1.29 pin to address CVE GHSA-7rgv-gqhr-fxg3 (DoS via multi-layer nesting)
]


[[tool.uv.index]]
name = "nvidia"
url = "https://pypi.nvidia.com"

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"
explicit = true

[[tool.uv.index]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu129"
explicit = true

[[tool.uv.index]]
name = "vllm-cu129"
url = "https://wheels.vllm.ai/0.22.0/cu129"
explicit = true

# RAPIDS nightly wheels (cudf/cuml/cugraph/raft + their lib*/rmm transitives).
# Non-explicit so the unsafe-best-match resolver can also pull the nightly-only
# transitives (librmm-cu12==26.8.*, pylibcudf-cu12, libcuml-cu12, libkvikio-cu12,
# …); prerelease="if-necessary-or-explicit" keeps it from leaking prereleases to
# unrelated packages.
[[tool.uv.index]]
name = "rapids-nightly"
url = "https://pypi.anaconda.org/rapidsai-wheels-nightly/simple"

[tool.uv.sources]
torch = [
    { index = "pytorch", marker = "sys_platform == 'linux' and (platform_machine == 'x86_64' or platform_machine == 'aarch64')" },
    { index = "pypi", marker = "sys_platform == 'darwin' or (platform_machine != 'x86_64' and platform_machine != 'aarch64')" },
]
torchaudio = [
    { index = "pytorch", marker = "sys_platform == 'linux' and (platform_machine == 'x86_64' or platform_machine == 'aarch64')" },
    { index = "pypi", marker = "sys_platform == 'darwin' or (platform_machine != 'x86_64' and platform_machine != 'aarch64')" },
]
torchvision = [
    { index = "pytorch", marker = "sys_platform == 'linux' and (platform_machine == 'x86_64' or platform_machine == 'aarch64')" },
    { index = "pypi", marker = "sys_platform == 'darwin' or (platform_machine != 'x86_64' and platform_machine != 'aarch64')" },
]
torchcodec = [
    { index = "pytorch", marker = "platform_machine == 'x86_64' and sys_platform != 'darwin'" },
    { index = "pypi", marker = "platform_machine != 'x86_64' or sys_platform == 'darwin'" },
]
ai-dynamo = { index = "nvidia" }
ai-dynamo-runtime = { index = "nvidia" }
vllm = [
    { index = "vllm-cu129", marker = "platform_machine == 'x86_64' and sys_platform != 'darwin'" },
    { index = "pypi", marker = "platform_machine != 'x86_64' or sys_platform == 'darwin'" },
]
nixl = { index = "pypi" }
nixl-cu12 = { index = "pypi" }
# Pin the top-level RAPIDS packages to the nightly index for determinism; their
# lib*/rmm transitives resolve from the same (non-explicit) index automatically.
cudf-cu12 = { index = "rapids-nightly" }
cuml-cu12 = { index = "rapids-nightly" }
pylibcugraph-cu12 = { index = "rapids-nightly" }
pylibraft-cu12 = { index = "rapids-nightly" }
raft-dask-cu12 = { index = "rapids-nightly" }
rapidsmpf-cu12 = { index = "rapids-nightly" }

[tool.coverage.paths]
source = ["nemo_curator", "/opt/Curator/nemo_curator", "/home/runner/work/Curator/Curator/nemo_curator"]

[tool.ruff]
line-length = 119
[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "D",  # pydocstyle
    "PTH",  # use pathlib
    "G",  # no enforcement during logging
    "FBT",  # allow booleans in function / class arguments
    "T20",  # allow printing
    "E501",  # allow line length violations, leave it to Black
    "ANN002",  # don't annotate **args
    "ANN003",  # don't annotate **kwargs
    "ANN204",  # don't annotate self/cls/special methods (__new__)
    "PT013",  # how to import pytest
    "PERF401",  # don't enforce list comprehension
    "RET505", "RET506", "RET507", "RET508",  # allow branching (if else after return)
    "PGH004",  # allow generic noqa

    "TD002",  # allow TODO without author
    "TD003",  # allow TODO without link
    "TRY003", # allow long exception messages rather than creating a new exception class
    "FIX002",  # allow TODO to exist,
    "EXE002", # don't require for a shebang to be present if it's executable
    "COM812", # disable the trailing comma in linter, because ruff formatter ensures it
    "SLF001", # allow accessing private attributes
    "PLC0415", # allow imports inside functions (lazy imports for optional/heavy deps)
]
fixable = ["ALL"]


[tool.ruff.lint.extend-per-file-ignores]
"nemo_curator/__init__.py" = ["F401"]
"examples/**" = [
    "INP001", # no __init__.py is required
]
"tests/**/*.py" = [
    "S101", # asserts allowed in tests
    "ANN201", # allow methods to not return something
    "ARG002", # allow unused method args (mock.patch decorator injects args not always referenced)
    "PLR2004", # magic value used in comparison
    "ERA001", # allow commented-out code
]
"benchmarking/**" = [
    "BLE001", # allow catching blind exceptions (benchmark runners need catch-all error handling)
]
"docs/**" = [
    "BLE001", # allow catching blind exceptions (Sphinx extensions need robust error handling)
]
"tutorials/**" = [
    "INP001", # no __init__.py is required
    "PLE2515", # ignore \u200b complaint
]
"fern/**/*.py" = [
    "INP001", # Fern CLI helper scripts; not an installable package
]
".github/scripts/**" = [
    "INP001", # CI scripts; not an installable package
]
".claude/skills/**/scripts/**" = [
    "INP001", # skill verification scripts; not an installable package
    "F401",   # imports are intentionally present to verify modules load
    "EXE001", # invoked via `python3 verify_*.py`; shebang is informational
    "ANN001", # type annotations not required for one-shot verification scripts
    "ANN201", # type annotations not required for one-shot verification scripts
]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "asyncio",
    "gpu: marks tests as GPU tests (deselect with '-m \"not gpu\"')",
]

[tool.check-manifest]
ignore = [
  "*.md",
  "*.cff",
  "*.lock",
  "*.txt",
  "*.yml",
  "*.yaml",
  "*.json",
  "*.toml",
  "*.sh",
  "*.cfg",
  "Makefile",
  "Dockerfile",
  "MAINTAINERS",
  "CODEOWNERS",
