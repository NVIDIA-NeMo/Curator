# Granary v2 - Qwen-Omni In-Process Pipeline (Hydra Config)
#
# Small PR first-stage pipeline:
#   NemoTarredAudioReader -> ASRStage (Qwen-Omni adapter) -> ShardedManifestWriter
#
# The middle stage uses the SDP-V2 stage->adapter split: the generic
# ``ASRStage`` owns Curator-side glue (task.data reads, validate_input,
# batching, ISO-code -> language-name lookup, schema mutation, metrics);
# the Qwen-Omni-specific knobs live under ``adapter_kwargs``. Swap models
# by replacing the single ``adapter_target:`` line.
#
# Invoked directly or by an external launcher via:
#   python tutorials/audio/qwen_omni_inprocess/main.py \
#       --config-path=<path> --config-name=qwen_omni_inprocess \
#       workspace_dir=/work input_manifest=/data/config.yaml
#
# For tarred data, `input_manifest` should point to the Granary YAML data config.

defaults:
  - _self_
  - override hydra/job_logging: none
  - override hydra/hydra_logging: none

hydra:
  run:
    dir: .
  output_subdir: null

# ===========================================================================
# CORE - these may be overridden at runtime by the launcher
# ===========================================================================
input_manifest: ???
workspace_dir: /local/qwen_omni_workspace
final_manifest: ${workspace_dir}/output.jsonl
language_short: en
max_segment_length: 40
hf_token: ""
backend: xenna
execution_mode: streaming
autoscale_interval_s: 30
prefetch_fail_on_error: true
stages_to_run: all
stages_to_skip: []

# data_config defaults to input_manifest.
data_config: ${input_manifest}
output_dir: ${workspace_dir}
corpus: null
max_utterances_per_shard: null
source_lang_key: source_lang
cpu_batch_size: 64
duration_key: duration

# ===========================================================================
# ASR (Qwen-Omni adapter) - stage knobs (Tier-1) + adapter knobs (Tier-2)
# ===========================================================================
# Tier-1 swap surface: replace adapter_target to change the underlying ASR
# model without touching stage code. Tier-2 knobs (adapter_kwargs.*) are
# adapter-specific and must be rewritten as a block when swapping adapters.
adapter_target: nemo_curator.adapters.asr.QwenOmniASRAdapter
model_id: "Qwen/Qwen3-Omni-30B-A3B-Instruct"

# Stage I/O keys (Tier-1)
pred_text_key: qwen3_prediction_s1
secondary_text_key: qwen3_prediction_s2

# Qwen-Omni adapter-specific knobs (Tier-2: adapter_kwargs.*)
ml_prompt: "Transcribe the audio."
ml_prompt_file: null
en_prompt_file: null
followup_prompt: null
followup_prompt_file: null
system_prompt: null
tensor_parallel_size: 2
omni_resource_gpus: 2.0
batch_size: 32
max_output_tokens: 256
max_model_len: 4096
max_num_seqs: 16
gpu_memory_utilization: 0.90
prep_workers: 16
keep_waveform: false

# ===========================================================================
# STAGE GRAPH
# ===========================================================================
# This explicit list is the only source of truth for the tutorial stage graph.
# Use `enabled`, `stages_to_run`, or `stages_to_skip` to choose stages.
stages:
  - stage_id: reader
    _target_: nemo_curator.stages.audio.io.nemo_tarred_reader.NemoTarredAudioReader
    yaml_path: ${data_config}
    corpus_filter: ${corpus}
    output_dir: ${output_dir}
    duration_key: ${duration_key}
    max_duration_s: ${max_segment_length}
    max_utterances_per_shard: ${max_utterances_per_shard}
    stage_with:
      nemo_tar_shard_reader:
        resources:
          _target_: nemo_curator.stages.resources.Resources
          cpus: 4.0

  - stage_id: qwen_omni
    # Tier 1 - generic stage. Swap adapter_target to change the ASR model.
    _target_: nemo_curator.stages.audio.inference.asr.ASRStage
    # Override the default 'ASR_inference' so perf_summary.stages keys
    # remain stable across pre-/post-refactor runs.
    name: QwenOmni_inference
    adapter_target: ${adapter_target}
    model_id: ${model_id}
    source_lang_key: ${source_lang_key}
    default_language: ${language_short}
    pred_text_key: ${pred_text_key}
    secondary_text_key: ${secondary_text_key}
    keep_waveform: ${keep_waveform}
    prefetch_fail_on_error: ${prefetch_fail_on_error}
    batch_size: ${batch_size}
    # Tier 2 - QwenOmniASRAdapter-only (rewrite entire block when swapping).
    adapter_kwargs:
      prompt_text: ${ml_prompt}
      prompt_file: ${ml_prompt_file}
      en_prompt_file: ${en_prompt_file}
      followup_prompt: ${followup_prompt}
      followup_prompt_file: ${followup_prompt_file}
      system_prompt: ${system_prompt}
      tensor_parallel_size: ${tensor_parallel_size}
      max_output_tokens: ${max_output_tokens}
      max_model_len: ${max_model_len}
      max_num_seqs: ${max_num_seqs}
      gpu_memory_utilization: ${gpu_memory_utilization}
      prep_workers: ${prep_workers}
    stage_with:
      resources:
        _target_: nemo_curator.stages.resources.Resources
        gpus: ${omni_resource_gpus}

  - stage_id: sharded_manifest_writer
    _target_: nemo_curator.stages.audio.io.sharded_manifest_writer.ShardedManifestWriterStage
    output_dir: ${output_dir}
    final_manifest_path: ${final_manifest}
    duration_key: ${duration_key}
    stage_with:
      batch_size: ${cpu_batch_size}
