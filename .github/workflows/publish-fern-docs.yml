# Fern docs publish workflow (NeMo Curator)
# Publishes the Fern documentation site when changes land on the docs-website branch.
#
# Required configuration:
# - Organization secret: DOCS_FERN_TOKEN (from `fern token` for the nvidia Fern org)

name: Publish Fern Docs

on:
  push:
    branches:
      - docs-website
    paths:
      - 'fern/**'
      - '.github/workflows/publish-fern-docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip the first run after repo creation
    if: ${{ github.event_name == 'workflow_dispatch' || github.run_number > 1 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Fern CLI
        run: npm install -g fern-api

      # Libraries in docs.yml write under fern/product-docs/ (gitignored).
      # Run before publish so the Full Library Reference is included in the site.
      - name: Generate library reference MDX (autodocs)
        working-directory: ./fern
        run: fern docs md generate

      - name: Publish Docs
        env:
          FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
        working-directory: ./fern
        run: fern generate --docs
