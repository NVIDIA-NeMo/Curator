# TTS Audio Tagging Pipeline - E2E Test Configuration
#
# Mirrors tutorials/audio/tagging/tts_pipeline.yaml with test-friendly defaults.
# Stages use _target_ for Hydra instantiation via create_pipeline_from_yaml.

input_manifest: ???
final_manifest: ???
workspace_dir: /tmp/tagging_test_workspace
resampled_audio_dir: ${workspace_dir}/audio_resampled
language_short: en
hf_token: ""
sample_rate: 16000
max_segment_length: 40
resources:
  cpus: 1

stages:
  # 0. Read input manifest
  - _target_: nemo_curator.stages.audio.common.ManifestReader
    manifest_path: ${input_manifest}
    files_per_partition: 1

  # 1. Resample audio to 16 kHz mono WAV
  - _target_: nemo_curator.stages.audio.tagging.ResampleAudioStage
    name: "ResampleAudio"
    resampled_audio_dir: ${resampled_audio_dir}
    input_format: "wav"
    target_sample_rate: ${sample_rate}
    target_format: "wav"
    target_nchannels: 1
    resources: ${resources}

  # 2. Speaker diarization (DiarizationStage + PyAnnoteDiarizationAdapter)
  - _target_: nemo_curator.stages.audio.inference.speaker_diarization.DiarizationStage
    name: "PyAnnoteDiarization"
    adapter_target: nemo_curator.adapters.diarization.PyAnnoteDiarizationAdapter
    model_id: "pyannote/speaker-diarization-3.1"
    non_speaker_max_length: ${max_segment_length}
    xenna_num_workers: 1
    resources:
      gpus: 1
    adapter_kwargs:
      hf_token: ${hf_token}
      max_length: ${max_segment_length}
      segmentation_batch_size: 2
      embedding_batch_size: 2

  # 3. Split long audio segments
  - _target_: nemo_curator.stages.audio.tagging.SplitLongAudioStage
    name: "SplitLongAudio"
    suggested_max_len: ${max_segment_length}
    min_len: 1.0
    resources: ${resources}

  # 4. ASR forced alignment (ForcedAlignmentStage + NeMoASRAlignAdapter)
  - _target_: nemo_curator.stages.audio.inference.alignment.ForcedAlignmentStage
    name: "ASRAlignment"
    adapter_target: nemo_curator.adapters.alignment.NeMoASRAlignAdapter
    model_id: "nvidia/parakeet-tdt_ctc-1.1b"
    batch_size: 1
    resources:
      gpus: 1
    adapter_kwargs:
      is_fastconformer: true
      decoder_type: ctc
      transcribe_batch_size: 4
      num_workers: 1

  # 5. Join split audio metadata
  - _target_: nemo_curator.stages.audio.tagging.JoinSplitAudioMetadataStage
    name: "JoinSplitMetadata"
    resources: ${resources}

  # 6. Merge alignment with diarization segments
  - _target_: nemo_curator.stages.audio.tagging.MergeAlignmentDiarizationStage
    name: "MergeAlignmentDiar"
    text_key: "text"
    words_key: "words"
    resources: ${resources}

  # 7. Write output manifest
  - _target_: nemo_curator.stages.audio.common.ManifestWriterStage
    output_path: ${final_manifest}
